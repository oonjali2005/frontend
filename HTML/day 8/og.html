<!DOCTYPE html>
<html>

<head>

    <title>Open Graph Meta Tags Example</title>

    <!-- Open Graph Meta Tags -->

    <meta property="og:title" content="My Webpage">

    <meta property="og:description"
          content="This webpage demonstrates Open Graph meta tags using HTML.">

    <meta property="og:image"
          content="image.jpg">

    <meta property="og:url"
          content="https://www.example.com">

</head>

<body>

    <h1>Open Graph Meta Tags</h1>

    <p>
        This webpage contains Open Graph meta properties
        using only HTML.
    </p>

</body>

</html>
