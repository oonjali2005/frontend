<!DOCTYPE html>
<html>

<head>
    <title>Semantic and Non-Semantic Tags</title>
</head>

<body>

    <h1>Semantic and Non-Semantic Tags Example</h1>

    <hr>

    <!-- Semantic Tags -->

    <header>
        <h2>Header Tag</h2>
        <p>This is a semantic header tag.</p>
    </header>

    <section>
        <h2>Section Tag</h2>
        <p>This is a semantic section tag.</p>
    </section>

    <footer>
        <p>This is a semantic footer tag.</p>
    </footer>

    <hr>

    <!-- Non-Semantic Tags -->

    <div>
        <h2>Div Tag</h2>
        <p>
            This is a non-semantic div tag.
            It does not clearly describe the content.
        </p>
    </div>

    <br>

    <span>
        This is a span tag used for small inline content.
    </span>

</body>

</html>
