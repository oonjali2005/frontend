<!DOCTYPE html>
<html>

<head>

    <title>Meta Tags Example</title>

    <!-- Charset Meta Tag -->
    <meta charset="UTF-8">

    <!-- Viewport Meta Tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Description Meta Tag -->
    <meta name="description" content="This webpage is created using HTML and contains basic meta tags.">

    <!-- Keywords Meta Tag -->
    <meta name="keywords" content="HTML, Meta Tags, Webpage, Web Development">

    <!-- Author Meta Tag -->
    <meta name="author" content="Arun Kumar">

</head>

<body>

    <h1>Basic Meta Tags Webpage</h1>

    <p>
        This webpage contains all important basic meta tags
        using only HTML.
    </p>

</body>

</html>
