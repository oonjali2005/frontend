<!DOCTYPE html>
<html>

<head>

    <title>Multimedia Webpage</title>

    <!-- Meta Tags -->
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="A multimedia webpage using HTML">

    <meta name="keywords"
          content="HTML, Audio, Video, Iframe, Favicon">

    <meta name="author"
          content="Arun">

    <!-- Favicon -->
    <link rel="icon"
          type="image/x-icon"
          href="favicon.ico">

</head>

<body>

    <!-- Heading -->
    <h1>Welcome to Multimedia Webpage</h1>

    <!-- Paragraph -->
    <p>
        This webpage contains audio, video,
        iframe, favicon, and meta tags
        using only HTML.
    </p>

    <hr>

    <!-- Audio -->
    <h2>Audio Player</h2>

    <audio controls>

        <source src="song.mp3" type="audio/mpeg">

        Your browser does not support audio.

    </audio>

    <hr>

    <!-- Video -->
    <h2>Video Player</h2>

    <video width="500" controls>

        <source src="video.mp4" type="video/mp4">

        Your browser does not support video.

    </video>

    <hr>

    <!-- Iframe -->
    <h2>YouTube Video</h2>

    <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/tgbNymZ7vqY">
    </iframe>

</body>

</html>
