<!--  Block Elements Used

 <html> - Root element of HTML page
 <body> - Main webpage content
 <header> - Top section of webpage
 <h1> - Main heading
 <section> - Section of content
 <p> - Paragraph
 <article> - Independent content/article
 <h2> - Sub heading
 <ul> - Unordered list
 <li> - List items
 <footer> - Bottom section of webpage

---

# Inline Elements Used

 <strong> - Important bold text
 <mark> - Highlight text
 <sup> - Superscript text
 <sub> - Subscript text
 <a> - Link
 <br> - Line break
 <i> - Italic text
 <button> - Button -->
    
<html>
    <head><title>Village Grocery Shop</title></head>
<body>


    <h1>Village Grocery Shop</h1>


<section>

    <p>
        Welcome to <strong>Village Grocery Shop</strong>.
        We sell <mark>Rice</mark>, <mark>Milk</mark>,
        and <mark>Oil</mark> daily.
    </p>

    <article>

        <h2>Today Offer</h2>

        <p>
            Buy Rice 5<sup>kg</sup> pack and get
            Milk 500<sub>ml</sub> free.
        </p>

        <a href="#">View Products</a>

        <br>

        <i>Fresh products available every morning.</i>

    </article>

    <ul>
        <li>Rice</li>
        <li>Milk</li>
        <li>Oil</li>
    </ul>

    <button>Buy Now</button>

</section>

<footer>
    Contact : 9876543210
</footer>

</body>
</html>
