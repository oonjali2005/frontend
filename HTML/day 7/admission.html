<!DOCTYPE html>
<html>
<head>
    <title>College Admission Form</title>
</head>

<body>

    <h1>College Admission Form</h1>

    <form>

        <fieldset>

            <legend>Student Information</legend>

            Name :
            <input type="text">
            <br><br>

            Email :
            <input type="email">
            <br><br>

            Gender :
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <br><br>

        </fieldset>

        <br>

        <fieldset>

            <legend>Course Details</legend>

            Select Department :
            <select>

                <optgroup label="Engineering">

                    <option>CSE</option>
                    <option>IT</option>
                    <option>ECE</option>
                    <option>EEE</option>

                </optgroup>

                <optgroup label="Arts">

                    <option>B.A English</option>
                    <option>B.Com</option>
                    <option>B.Sc Maths</option>

                </optgroup>

            </select>

            <br><br>

            Address :
            <br>
            <textarea rows="4" cols="30"></textarea>

        </fieldset>

        <br>

        <input type="submit" value="Apply">

    </form>

</body>
</html>
