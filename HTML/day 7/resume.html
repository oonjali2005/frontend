<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder Form</title>
</head>

<body>

    <h1>Resume Builder Form</h1>

    <form>

        <fieldset>

            <legend>Personal Details</legend>

            Full Name :
            <input type="text">
            <br><br>

            Email :
            <input type="email">
            <br><br>

            Mobile Number :
            <input type="text">
            <br><br>

            Address :
            <br>
            <textarea rows="4" cols="30"></textarea>

        </fieldset>

        <br>

        <fieldset>

            <legend>Education Details</legend>

            College Name :
            <input type="text">
            <br><br>

            Degree :
            <input type="text">
            <br><br>

            Percentage :
            <input type="number">
            <br><br>

            Year of Passing :
            <input type="date">

        </fieldset>

        <br>

        <fieldset>

            <legend>Skills</legend>

            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript
            <input type="checkbox"> Python

        </fieldset>

        <br>

        <fieldset>

            <legend>Experience</legend>

            Experience Level :
            <select>

                <option>Fresher</option>
                <option>1 Year</option>
                <option>2 Years</option>
                <option>3+ Years</option>

            </select>

            <br><br>

            Previous Company :
            <input type="text">

        </fieldset>

        <br>

        <fieldset>

            <legend>Upload Resume</legend>

            Upload File :
            <input type="file">

        </fieldset>

        <br>

        <input type="submit" value="Submit Resume">

    </form>

</body>
</html>
