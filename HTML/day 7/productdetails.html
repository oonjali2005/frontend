<!DOCTYPE html>
<html>
<head>
    <title>Product Details Table</title>
</head>

<body>

    <h1>Product Details</h1>

    <table border="1" cellpadding="10">

        <tr>
            <th>Product Image</th>
            <th>Product Name</th>
            <th>Category</th>
            <th>Stock</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>

        <tr>
            <td>
                <img src="laptop.jpg" width="100" height="80">
            </td>
            <td>Laptop</td>
            <td>Electronics</td>
            <td>Available</td>
            <td>5</td>
            <td>50000</td>
        </tr>

        <tr>
            <td>
                <img src="phone.jpg" width="100" height="80">
            </td>
            <td>Mobile Phone</td>
            <td>Electronics</td>
            <td>Available</td>
            <td>10</td>
            <td>20000</td>
        </tr>

        <tr>
            <td>
                <img src="watch.jpg" width="100" height="80">
            </td>
            <td>Smart Watch</td>
            <td>Accessories</td>
            <td>Out of Stock</td>
            <td>0</td>
            <td>5000</td>
        </tr>

    </table>

</body>
</html>
