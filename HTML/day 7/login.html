<!DOCTYPE html>
<html>
<head>
    <title>Login and Signup Form</title>
</head>

<body>

    <h1>Login Form</h1>

    <form>

        Username :
        <input type="text" 
               placeholder="Enter Username"
               required
               minlength="3"
               maxlength="15">
        <br><br>

        Password :
        <input type="password"
               placeholder="Enter Password"
               required
               minlength="6"
               maxlength="12">
        <br><br>

        <input type="submit" value="Login">

    </form>

    <hr>

    <h1>Signup Form</h1>

    <form>

        Full Name :
        <input type="text"
               placeholder="Enter Full Name"
               required
               minlength="3"
               maxlength="20">
        <br><br>

        Email :
        <input type="email"
               placeholder="Enter Email"
               required>
        <br><br>

        Password :
        <input type="password"
               placeholder="Create Password"
               required
               minlength="6"
               maxlength="12">
        <br><br>

        Mobile Number :
        <input type="text"
               placeholder="Enter Mobile Number"
               required
               minlength="10"
               maxlength="10">
        <br><br>

        <input type="submit" value="Signup">

    </form>

</body>
</html>
