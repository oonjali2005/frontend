            <th colspan="2">Department Details</th>
            <th rowspan="2">Salary</th>

            <th>Location</th>
        </tr>

        <tr>

        </tr>

        <tr>
            <td>102</td>
            <td>Vijay</td>
            <td>IT</td>
            <td>Bangalore</td>
            <td>35000</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Karthik</td>
            <td>Finance</td>
            <td>Coimbatore</td>
            <td>30000</td>
        </tr>

    </table>

</body>
</html>
